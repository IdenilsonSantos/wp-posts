version: "3.9"

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: igrpcom
    ports:
      - "3000:3000"
    env_file:
      - ./apps/api/.env
    depends_on:
      - postgres
      - redis
      - json-server

  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    ports:
      - "5432:5432"
    env_file:
      - ./apps/api/.env
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis_db
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    env_file:
      - ./apps/api/.env

  json-server:
    image: node:20-alpine
    container_name: json-server
    working_dir: /app
    volumes:
      - ./apps/api/src/utils/mockPosts.json:/app/mockPosts.json
    command: sh -c "mkdir -p /app/public && npx json-server /app/mockPosts.json --host 0.0.0.0 --port $${JSON_SERVER_PORT}"
    ports:
      - "${JSON_SERVER_PORT}:${JSON_SERVER_PORT}"
    env_file:
      - ./apps/api/.env

volumes:
  postgres-data:
